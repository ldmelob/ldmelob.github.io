<html>
    <head>
        <title> Chaos Egg </title>
          <style>
            body {
                background-color: black;
                padding: 0px;
            }
          </style>
    </head>
        <body>
            <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/ldmelob/canvas-matrix@main/CanvasMatrix.js"></script>
            <script type="text/javascript">
                const n = window.innerHeight >= window.innerWidth ? window.innerWidth: window.innerHeight;
                const c = n >> 1;
                const p = 255 / (2 * c * c);
                const matrix = new CanvasMatrix(n, n);
                if (window.innerHeight >= window.innerWidth) {
                    matrix.canvas.style.marginTop = (window.innerHeight - n) / 2 + 'px';
                } else {
                    matrix.canvas.style.marginLeft = (window.innerWidth - n) / 2 + 'px';
                }
                document.body.style.margin = '0px';
                document.body.style.padding= '0xp';
                document.body.appendChild(matrix.canvas);
                
                var t = 0;
                function dis(x, y) {
                
                    return (x - c) * (x - c) + (y - c) * (y - c);
                
                }
                function an() {
                    t++;
                    for (x = 0; x < n; x++) {
                
                        for (y = 0; y < n; y++) {
                
                            d = dis(x, y);
                            if (t > d * 2) {
                                act = matrix.getp(x, y);
                                md = t % d;
                                r = (act[0] + (md % 5)) % 255;
                                g = (act[1] + (md % 3)) % 255;
                                b = (act[2] + (md % 2)) % 255;
                                matrix.setp(x, y, r, g, b, 255)
                            }
                
                        }
                
                    }
                    matrix.render();
                    requestAnimationFrame(an);
                }
                requestAnimationFrame(an);
            </script>
    </body>
</html>
