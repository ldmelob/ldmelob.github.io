<html>
    <head>
        <title> Divisors Viewer </title>
          <style>
            body {
                background-color: black;
                padding: 0px;
            }
          </style>
    </head>
        <body>
            <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/ldmelob/canvas-matrix@main/CanvasMatrix.js"></script>
            <script type="text/javascript">

                // Setting canvas
                const D = 512;
                const matrix = new CanvasMatrix(D, D);
                matrix.canvas.style.marginTop = (window.innerHeight - D) / 2 + 'px';
                matrix.canvas.style.marginLeft = (window.innerWidth - D) / 2 + 'px';
                matrix.canvas.style.width = D + 'px';
                matrix.canvas.style.height = D + 'px';
                matrix.canvas.style.imageRendering = 'pixelated';
                matrix.ctx.imageSmoothingEnabled = false;
                document.body.style.margin = '0px';
                document.body.style.padding= '0xp';
                document.body.appendChild(matrix.canvas);

                // Main script
                let t = 0;
                let v = 27;
            
                function draw() {
            
                    for (x = 0; x < D; x++) {
            
                        for (y = 0; y < D; y++) {
            
                            let cor = (t + v * (x * x + y * y)) % 256;
            
                            matrix.setp(x, y, 255-cor, Math.abs(cor-127)*2, cor, 255);
            
                        }
            
            
                    }
            
                    matrix.render();
                    t+=1;
                    if(t%500 == 0) {v++;}
                    requestAnimationFrame(draw);
            
                }
            
                requestAnimationFrame(draw);
                
            </script>
    </body>
</html>
